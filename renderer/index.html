<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'">
  <title>Pomodoro Timer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 class="title">Pomodoro</h1>

    <div class="timer-wrapper">
      <svg class="timer-circle" viewBox="0 0 300 300">
        <circle class="timer-circle-bg" cx="150" cy="150" r="135" />
        <circle class="timer-circle-fg" cx="150" cy="150" r="135" />
      </svg>
      <div class="timer-display" id="timer-display">25:00</div>
    </div>

    <div class="session-label" id="session-label">Work</div>
    <div class="session-count" id="session-count"></div>

    <div class="buttons">
      <button id="btn-start" class="btn btn-start">Start</button>
      <button id="btn-pause" class="btn btn-pause" disabled>Pause</button>
      <button id="btn-reset" class="btn btn-reset" disabled>Reset</button>
    </div>
  </div>

  <script src="timer.js"></script>
</body>
</html>
